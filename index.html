<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Mensajes 🌻</title>
    <style>
  /* Cambiamos a fuentes más legibles y elegantes */
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@400;600&display=swap');

  :root {
    --gold: #FFD700;
    --amber: #FFA500;
    --bg-dark: #0a0500;
    --glass: rgba(0, 0, 0, 0.85); /* Fondo más oscuro para que la letra resalte */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(circle at center, #1a0a00 0%, #000000 100%);
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Poppins', sans-serif; /* Fuente base limpia */
    color: white;
  }

  /* --- PANEL DE MENSAJES (MÁS LEGIBLE) --- */
  #message-board {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-width: 650px;
    min-height: 100px;
    background: var(--glass); /* Fondo negro sólido para contraste */
    border: 2px solid var(--gold);
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    /* Fuente Playfair para el mensaje: Elegante pero Clara */
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 5vw, 2rem); 
    font-weight: 600;
    line-height: 1.3;
    color: var(--gold);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(255, 215, 0, 0.2);
    z-index: 1000;
    transition: all 0.4s ease;
  }

  .message-active {
    animation: fadeInScale 0.6s ease-out forwards;
    display: block;
  }

  @keyframes fadeInScale {
    0% { opacity: 0; transform: scale(0.9); filter: blur(5px); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }

  /* --- GALAXIA --- */
  .galaxy {
    position: fixed;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
  }

  .flower-orbit {
    position: absolute;
    top: 50%; left: 50%;
    animation: orbit linear infinite;
  }

  @keyframes orbit {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .flower-wrap {
    position: absolute;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  .flower-wrap:hover {
    transform: scale(1.2);
  }

  /* --- EFECTO EXPLOSIÓN --- */
  .exploding {
    animation: explode 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    pointer-events: none;
  }

  @keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(2.5); filter: brightness(2) contrast(1.5); opacity: 0.8; }
    100% { transform: scale(0); opacity: 0; }
  }

  .particle {
    position: fixed;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 500;
    box-shadow: 0 0 10px var(--gold);
  }

  /* Contador */
  .counter {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.9rem;
    color: rgba(255, 215, 0, 0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

</style>
  </head>
  <body>

    <div id="message-board">Toca una flor para revelar un secreto... 🌻</div>
    <div class="galaxy" id="galaxy"></div>
    <div class="counter" id="counter">Cargando Galaxia...</div>

    <script>
const galaxy = document.getElementById('galaxy');
const board = document.getElementById('message-board');
const counterEl = document.getElementById('counter');

const phrases = [
  "Eres mi sol cada mañana ☀️", "Mi corazón late por ti 💛", 
  "Eres lo más bonito de mi vida 🌻", "Contigo todo tiene color 🎨",
  "Me enamoro de ti cada día 💫", "Tú eres mi galaxia entera 🌌",
  "Tu sonrisa me ilumina 🌈", "Eres mi mayor alegría 😊",
  "A tu lado el mundo es mejor 🌍", "Eres mi sueño hecho realidad ✨",
  "Gracias por existir, amor 💖", "Eres mi lugar favorito en el mundo 🏠",
  "Tu amor es mi motor 🚀", "Eres la flor más bella del jardín 🌸",
  "Te amo hasta el infinito 💍", "Cada día a tu lado es un regalo 🎁",
  "Eres mi calma en la tormenta 🌊", "Tu risa es mi canción favorita 🎶"
];

let remaining = phrases.length;
updateCounter();

function updateCounter() {
  counterEl.innerText = `Quedan ${remaining} flores por descubrir`;
}

function createFlowerSVG(size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" style="filter: drop-shadow(0 0 5px rgba(255,215,0,0.5))">
    <circle cx="50" cy="50" r="15" fill="#3E1F00" />
    ${Array.from({length: 10}, (_, i) => `
      <ellipse cx="50" cy="20" rx="10" ry="22" fill="#FFD700" transform="rotate(${i*36} 50 50)" />
    `).join('')}
  </svg>`;
}

const config = [
  { r: 18, count: 4, speed: 25 },
  { r: 32, count: 6, speed: 40 },
  { r: 48, count: 8, speed: 55 }
];

config.forEach(orb => {
  const container = document.createElement('div');
  container.className = 'flower-orbit';
  container.style.animationDuration = orb.speed + 's';
  
  for(let i=0; i<orb.count; i++) {
    const angle = (i / orb.count) * (Math.PI * 2);
    const wrap = document.createElement('div');
    wrap.className = 'flower-wrap';
    
    // Posicionamiento responsivo basado en ancho de pantalla
    wrap.style.left = (Math.cos(angle) * orb.r) + 'vw';
    wrap.style.top = (Math.sin(angle) * orb.r) + 'vw';
    
    wrap.innerHTML = createFlowerSVG(45 + Math.random()*15);
    
    wrap.onclick = (e) => {
      if(wrap.classList.contains('exploding')) return;
      
      const msg = phrases.pop() || "¡Eres el amor de mi vida! 👑💛";
      board.innerHTML = `<span class="message-active">${msg}</span>`;
      
      wrap.classList.add('exploding');
      createParticles(e.clientX, e.clientY);
      
      remaining = Math.max(0, remaining - 1);
      updateCounter();
      if(remaining === 0) {
        setTimeout(() => {
          board.innerHTML = "<span class='message-active'>✨ ¡Has recolectado todo mi amor! Eres mi universo entero. ✨</span>";
        }, 1000);
      }
    };
    
    container.appendChild(wrap);
  }
  galaxy.appendChild(container);
});

function createParticles(x, y) {
  for(let i=0; i<20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    const destX = (Math.random() - 0.5) * 300;
    const destY = (Math.random() - 0.5) * 300;
    
    p.animate([
      { transform: 'translate(0, 0) scale(1)', opacity: 1 },
      { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
    ], { duration: 1200, easing: 'ease-out' });
    
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}
</script>
  </body>
</html>
