<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Mensajes 🌻</title>
    <style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&display=swap');

  :root {
    --gold: #FFD700;
    --amber: #FFA500;
    --bg: #050200;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(circle at center, #1a0a00 0%, #000000 100%);
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Dancing Script', cursive;
    color: var(--gold);
  }

  /* --- PANEL DE MENSAJES (ARRIBA) --- */
  #message-board {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 600px;
    min-height: 80px;
    background: rgba(255, 215, 0, 0.1);
    backdrop-filter: blur(10px);
    border: 2px solid var(--gold);
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 15px;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    z-index: 1000;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .message-active {
    animation: slideDown 0.5s ease-out;
    text-shadow: 0 0 10px var(--gold);
  }

  @keyframes slideDown {
    0% { opacity: 0; transform: translateY(-20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* --- GALAXIA --- */
  .galaxy {
    position: fixed;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
  }

  .flower-orbit {
    position: absolute;
    top: 50%; left: 50%;
    animation: orbit linear infinite;
  }

  @keyframes orbit {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .flower-wrap {
    position: absolute;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  /* --- EFECTO EXPLOSIÓN --- */
  .exploding {
    animation: explode 0.5s forwards;
    pointer-events: none;
  }

  @keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(2); filter: brightness(2); opacity: 0.5; }
    100% { transform: scale(0); opacity: 0; }
  }

  .particle {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 500;
  }

  .counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 1.2rem;
    opacity: 0.7;
  }

</style>
  </head>
  <body>

    <div id="message-board">Toca una flor para revelar un secreto... 🌻</div>
    <div class="galaxy" id="galaxy"></div>
    <div class="counter" id="counter">Flores restantes: 0</div>

    <script>
const galaxy = document.getElementById('galaxy');
const board = document.getElementById('message-board');
const counterEl = document.getElementById('counter');

const phrases = [
  "Eres mi sol cada mañana ☀️", "Mi corazón late por ti 💛", 
  "Eres lo más bonito de mi vida 🌻", "Contigo todo tiene color 🎨",
  "Me enamoro de ti cada día 💫", "Tú eres mi galaxia entera 🌌",
  "Tu sonrisa me ilumina 🌈", "Eres mi mayor alegría 😊",
  "A tu lado el mundo es mejor 🌍", "Eres mi sueño hecho realidad ✨",
  "Gracias por existir, amor 💖", "Eres mi lugar favorito en el mundo 🏠",
  "Tu amor es mi motor 🚀", "Eres la flor más bella del jardín 🌸",
  "Sin ti nada sería igual 💍", "Te amo hasta el infinito 🚀🌌"
];

let remaining = phrases.length;
counterEl.innerText = `Flores restantes: ${remaining}`;

function createFlowerSVG(size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="15" fill="#4B2C20" />
    ${Array.from({length: 10}, (_, i) => `
      <ellipse cx="50" cy="20" rx="10" ry="20" fill="#FFD700" transform="rotate(${i*36} 50 50)" />
    `).join('')}
  </svg>`;
}

// Configuración de órbitas responsivas
const config = [
  { r: 15, count: 4, speed: 25 },
  { r: 30, count: 6, speed: 40 },
  { r: 45, count: 6, speed: 55 }
];

config.forEach(orb => {
  const container = document.createElement('div');
  container.className = 'flower-orbit';
  container.style.animationDuration = orb.speed + 's';
  
  for(let i=0; i<orb.count; i++) {
    const angle = (i / orb.count) * (Math.PI * 2);
    const wrap = document.createElement('div');
    wrap.className = 'flower-wrap';
    
    // Posición dinámica usando VW para que sea responsivo
    wrap.style.left = (Math.cos(angle) * orb.r) + 'vw';
    wrap.style.top = (Math.sin(angle) * orb.r) + 'vw';
    
    wrap.innerHTML = createFlowerSVG(40 + Math.random()*20);
    
    wrap.onclick = (e) => {
      if(wrap.classList.contains('exploding')) return;
      
      // 1. Mostrar mensaje arriba
      const msg = phrases.pop() || "¡Me quedé sin palabras de tanto amarte! 💛";
      board.innerHTML = `<span class="message-active">${msg}</span>`;
      board.style.borderColor = "#FFF";
      setTimeout(() => board.style.borderColor = "var(--gold)", 500);

      // 2. Efecto explosión
      wrap.classList.add('exploding');
      createParticles(e.clientX, e.clientY);
      
      // 3. Actualizar contador
      remaining = Math.max(0, remaining - 1);
      counterEl.innerText = `Flores restantes: ${remaining}`;
      if(remaining === 0) board.innerHTML = "¡Has recolectado todo mi amor! 🌻👑";
    };
    
    container.appendChild(wrap);
  }
  galaxy.appendChild(container);
});

function createParticles(x, y) {
  for(let i=0; i<15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    const destX = (Math.random() - 0.5) * 200;
    const destY = (Math.random() - 0.5) * 200;
    
    p.animate([
      { transform: 'translate(0, 0) scale(1)', opacity: 1 },
      { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
    ], { duration: 1000, easing: 'ease-out' });
    
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}
</script>
  </body>
</html>
